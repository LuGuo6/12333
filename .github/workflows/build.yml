name: Build KPM

# ============================================================
# GitHub Actions 工作流 - 自动编译 KPM 模块
# ============================================================
# 触发条件:
#   1. push 到仓库时
#   2. 手动触发 (workflow_dispatch)  ← 推荐
# ============================================================

on:
  push:
    paths:
      - ".github/workflows/**"
      - "**.c"
      - "**.h"

  workflow_dispatch:
    inputs:
      release:
        description: "是否发布 Release"
        required: false
        default: "false"
      version:
        description: "Release 版本号"
        required: false
        default: "2025062700"

jobs:
  Build-on-Ubuntu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: UTC-8
      ANDROID_NDK_LATEST_HOME: /tmp/android-ndk

    outputs:
      kpm_list: ${{ steps.list-kpms.outputs.kpm_list }}
      has_kpms: ${{ steps.list-kpms.outputs.has_kpms }}

    steps:
      # 步骤1: 检出代码
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # 步骤2: 初始化 KernelPatch 子模块
      - name: Init KernelPatch submodule
        run: |
          echo "=== .gitmodules ==="
          cat .gitmodules || echo ".gitmodules not found"

          echo "=== git submodule status ==="
          git submodule status || echo "no submodules"

          echo "=== git submodule update ==="
          git submodule update --init --recursive 2>&1 || {
            echo "submodule update failed, cloning manually..."
            rm -rf KernelPatch
            git clone --depth=1 https://github.com/bmax121/KernelPatch.git KernelPatch
          }

          echo "=== Verify KernelPatch ==="
          ls -la KernelPatch/
          echo "---"
          ls -la KernelPatch/kernel/ 2>/dev/null || echo "no kernel/ dir"
          echo "---"
          find KernelPatch -name "hook.h" -type f 2>/dev/null || echo "hook.h not found"

          echo "=== KernelPatch OK ==="

      # 步骤3: 下载 Android NDK
      - name: Setup Android NDK
        run: |
          NDK_VERSION="r27c"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/${NDK_ZIP}"

          echo "Downloading Android NDK ${NDK_VERSION}..."
          wget -q --show-progress ${NDK_URL} -O /tmp/${NDK_ZIP}

          echo "Extracting NDK..."
          unzip -q /tmp/${NDK_ZIP} -d /tmp/
          mv /tmp/android-ndk-${NDK_VERSION} /tmp/android-ndk

          echo "NDK ready"
          ls /tmp/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang

      # 步骤4: 安装依赖
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install llvm jq -y

      # 步骤5: 编译所有 KPM 模块
      - name: Build KPM
        run: |
          set -e  # 任何命令失败立即退出

          mkdir -p target

          echo "=== Project structure ==="
          ls -la
          echo ""
          echo "=== Looking for module directories ==="

          for dir in */; do
            # 跳过非模块目录
            case "$dir" in
              KernelPatch/|target/|.github/|my_kpm/) continue ;;
            esac

            # 跳过没有 Makefile 的目录
            if [ ! -f "${dir}Makefile" ]; then
              echo "Skip (no Makefile): ${dir}"
              continue
            fi

            echo ""
            echo "=========================================="
            echo "Building module: ${dir}"
            echo "=========================================="

            make -C "${dir}"

            # 移动产物到 target
            if ls ${dir}*.kpm 1>/dev/null 2>&1; then
              mv ${dir}*.kpm target/
              echo "Module ${dir} built successfully!"
            else
              echo "WARNING: No .kpm file generated for ${dir}"
            fi
          done

          echo ""
          echo "=== Build Results ==="
          if ls target/*.kpm 1>/dev/null 2>&1; then
            ls -la target/
            echo "Build successful!"
          else
            echo "ERROR: No KPM files were generated"
            echo "Please check the build logs above for errors"
            exit 1
          fi

      # 步骤6: 生成 KPM 列表
      - name: Generate KPM list
        id: list-kpms
        run: |
          if ls target/*.kpm 1>/dev/null 2>&1; then
            kpms=$(ls target/*.kpm | xargs -n1 basename | jq -R -s -c 'split("\n")[:-1]')
            echo "kpm_list=${kpms}" >> "${GITHUB_OUTPUT}"
            echo "has_kpms=true" >> "${GITHUB_OUTPUT}"
            echo "Found KPMs: ${kpms}"
          else
            echo "kpm_list=[]" >> "${GITHUB_OUTPUT}"
            echo "has_kpms=false" >> "${GITHUB_OUTPUT}"
            echo "No KPM files found"
          fi

      # 步骤7: 上传所有 kpm
      - name: Upload all KPMS
        if: steps.list-kpms.outputs.has_kpms == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: all_kpms
          path: target

      # 步骤8: 发布 Release (仅手动触发时)
      - name: Upload release
        if: github.event.inputs.release == 'true' && steps.list-kpms.outputs.has_kpms == 'true'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ github.event.inputs.version }}
          tag: ${{ github.event.inputs.version }}
          artifacts: "target/*.kpm"
          allowUpdates: true
          generateReleaseNotes: true
          makeLatest: true
          omitBodyDuringUpdate: true
          replacesArtifacts: true

  # 步骤9: 分别上传每个 kpm (仅当有产物时)
  Upload-artifacts:
    needs: Build-on-Ubuntu
    if: needs.Build-on-Ubuntu.outputs.has_kpms == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        kpm: ${{ fromJson(needs.Build-on-Ubuntu.outputs.kpm_list) }}

    steps:
      - name: Download target
        uses: actions/download-artifact@v8
        with:
          name: all_kpms

      - name: Upload ${{ matrix.kpm }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.kpm }}
          path: ${{ matrix.kpm }}
          archive: false